<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendario GPS Rescatados</title>
  <style>
    :root { 
      /* Paleta Moderna */
      --primary: #4f46e5; 
      --primary-hover: #4338ca;
      --secondary: #0ea5e9; 
      --bg: #f8fafc; 
      --surface: #ffffff; 
      --text-main: #0f172a; 
      --text-muted: #64748b; 
      --border: #e2e8f0; 
      
      /* Sombras modernas */
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
      --shadow-primary: 0 10px 15px -3px rgba(79, 70, 229, 0.2);
      
      --radius-lg: 20px;
      --radius-md: 12px;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { box-sizing: border-box; }
    
    body { 
      margin: 0; 
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
      background: var(--bg); 
      padding: 2rem 1rem; 
      color: var(--text-main); 
      line-height: 1.5;
    }

    /* Encabezado Moderno */
    header { 
      text-align: center; 
      margin-bottom: 2rem; 
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.25rem;
    }
    header h1:first-child { 
      margin: 0;
      font-size: 0.875rem; 
      color: var(--text-muted); 
      text-transform: uppercase; 
      letter-spacing: 0.1em;
      font-weight: 600;
    }
    header h1:last-child { 
      margin: 0;
      font-size: 2.5rem; 
      font-weight: 800; 
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.02em;
    }
    
    /* Controles */
    .controls-wrapper {
      display: flex;
      justify-content: center;
      margin-bottom: 1rem;
      width: 100%;
    }
    .controls { 
      display: inline-flex; 
      align-items: center; 
      flex-wrap: nowrap;
      gap: 0.5rem; 
      background: var(--surface);
      padding: 0.5rem;
      border-radius: 100px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border);
      max-width: 100%; /* Evita que desborde la pantalla */
    }

    .controls button { 
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      width: 44px;
      height: 44px;
      padding: 0;
      background: var(--surface); 
      color: var(--text-main); 
      border: 1px solid transparent; 
      border-radius: 50%; 
      cursor: pointer; 
      transition: var(--transition); 
    }
    .controls button:hover:not(:disabled) { 
      background: var(--bg);
      color: var(--primary);
      transform: scale(1.05);
    }
    .controls button:disabled { 
      color: #cbd5e1; 
      cursor: not-allowed; 
      opacity: 0.5;
    }
    
    .week-select-wrapper { 
      position: relative; 
      flex: 1 1 auto; /* Permite que el selector crezca o encoja según el espacio */
      min-width: 150px; /* Ancho mínimo mucho más seguro para celulares */
    }
    .week-select-wrapper::after { 
      content: '▾'; 
      position: absolute; 
      right: 12px; 
      top: 50%; 
      transform: translateY(-50%); 
      color: var(--text-muted); 
      pointer-events: none; 
      font-size: 1.2rem; 
    }
    .week-select { 
      appearance: none; 
      width: 100%; 
      padding: 0.65rem 2.2rem 0.65rem 1rem; 
      font-size: 0.95rem;
      font-weight: 600;
      text-align: center;
      border: none; 
      background: transparent; 
      color: var(--text-main); 
      outline: none; 
      cursor: pointer; 
      border-radius: 100px;
      transition: var(--transition);
      text-overflow: ellipsis; /* Pone "..." si la fecha no cabe */
    }
    .week-select:hover {
      background: var(--bg);
    }
    .week-select:focus { 
      box-shadow: inset 0 0 0 2px var(--primary); 
    }
    
    .week-range { 
      text-align: center; 
      font-size: 0.95rem; 
      font-weight: 500; 
      margin: 0 0 2rem 0; 
      color: var(--text-muted); 
    }
    
    /* Calendario y Tarjetas */
    .calendar { 
      display: grid; 
      gap: 1.5rem; 
      max-width: 800px; 
      margin: 0 auto; 
    }
    .day-group { 
      background: var(--surface); 
      border-radius: var(--radius-lg); 
      box-shadow: var(--shadow-sm); 
      border: 1px solid var(--border);
      overflow: hidden; 
      transition: var(--transition); 
    }
    .day-group:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }
    
    /* Destacado de "Hoy" */
    .day-group.today-highlight {
      border: 2px solid var(--primary);
      box-shadow: var(--shadow-primary);
    }
    .today-badge {
      background: var(--primary);
      color: #fff;
      font-size: 0.7rem;
      padding: 0.25rem 0.75rem;
      border-radius: 100px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .date-header { 
      background: var(--surface); 
      color: var(--text-main); 
      padding: 1rem 1.25rem; 
      font-weight: 700; 
      font-size: 1.1rem;
      text-transform: capitalize; 
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }
    
    /* Estilos Generales de Actividad */
    .activity { 
      display: grid; 
      align-items: center; 
      transition: var(--transition);
    }
    .activity:not(:last-child) {
      border-bottom: 1px solid var(--border);
    }

    /* Actividad Normal (Reunión) - Mantiene su alto normal */
    .activity.meeting {
      grid-template-columns: 88px 1fr; 
      gap: 1.25rem; 
      padding: 1.25rem; 
    }
    .activity.meeting img { 
      width: 88px; 
      height: 88px; 
      object-fit: cover; 
      border-radius: var(--radius-md); 
      box-shadow: var(--shadow-sm);
      transition: var(--transition);
    }
    .activity.meeting:hover img {
      transform: scale(1.03);
    }
    .activity.meeting .activity-title { 
      font-weight: 700; 
      font-size: 1.05rem;
      margin-bottom: 0.35rem; 
      color: var(--text-main);
    }
    .activity.meeting .activity-description { 
      color: var(--text-muted); 
      font-size: 0.95rem;
      line-height: 1.5; 
    }

    /* --- ESTILOS COMPACTOS PARA CUMPLEAÑOS (Mitad de alto) --- */
    .activity.birthday {
      grid-template-columns: 40px 1fr; /* Ícono más pequeño */
      gap: 1rem;
      padding: 0.5rem 1.25rem; /* Padding reducido drásticamente */
      background: linear-gradient(135deg, #fff0f6 0%, #ffe4e6 100%); 
      border-left: 4px solid #f43f5e; 
      min-height: 60px; /* Asegura que sea la mitad de los ~128px de la reunión */
    }
    .birthday-icon-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      background: #ffffff;
      border-radius: 50%;
      box-shadow: var(--shadow-sm);
      font-size: 1.2rem; /* Emoji ajustado */
    }
    .birthday-title {
      /* font-weight: 800; */
      color: #e11d48;
      font-size: 0.95rem; /* Título más pequeño */
      margin-bottom: 0.1rem;
    }
    .birthday-description {
      color: #be123c;
      font-size: 0.85rem; /* Texto más pequeño para ajustar al alto reducido */
      font-weight: 500;
      margin: 0;
    }
    /* -------------------------------------- */
    
    a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
      transition: var(--transition);
    }
    a:hover {
      color: var(--secondary);
      text-decoration: underline;
      text-underline-offset: 4px;
    }

    .empty-week { 
      background: transparent; 
      border: 2px dashed var(--border);
      border-radius: var(--radius-lg); 
      padding: 3rem 1.25rem; 
      text-align: center; 
      color: var(--text-muted); 
      max-width: 800px; 
      margin: 0 auto; 
      font-weight: 500;
    }
    
    @media (max-width: 600px) {
      .activity.meeting { grid-template-columns: 64px 1fr; gap: 1rem; padding: 1rem; }
      .activity.meeting img { width: 64px; height: 64px; }
      
      /* Ajuste móvil para cumpleaños aún más compacto */
      .activity.birthday { grid-template-columns: 36px 1fr; gap: 0.75rem; padding: 0.5rem 1rem; }
      .birthday-icon-wrapper { width: 36px; height: 36px; font-size: 1rem; }
      header h1:last-child { font-size: 2rem; }
      
      /* Ajuste exacto para que todo el panel de control quepa en celulares angostos */
      .controls { width: 100%; justify-content: space-between; padding: 0.35rem; }
      .controls button { width: 38px; height: 38px; } /* Botones levemente más pequeños */
      .week-select { font-size: 0.82rem; padding: 0.5rem 1.5rem 0.5rem 0.5rem; } /* Texto ajustado */
    }
  </style>
</head>

    const weekSelect = document.getElementById('weekSelect');
    const prevWeekBtn = document.getElementById('prevWeekBtn');
    const nextWeekBtn = document.getElementById('nextWeekBtn');
    
    let currentDate = new Date();
    let availableWeeks = [];

    function getStartOfWeek(date) { 
      const d = new Date(date); 
      d.setHours(0,0,0,0); 
      const day = d.getDay(); 
      d.setDate(d.getDate() - day); 
      return d; 
    }

    function formatDate(date) { 
      const y = date.getFullYear(), m = String(date.getMonth()+1).padStart(2,'0'), d = String(date.getDate()).padStart(2,'0'); 
      return `${y}-${m}-${d}`; 
    }
    
    function formatDDMMYYYY(date) {
      const d = String(date.getDate()).padStart(2, '0');
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const y = date.getFullYear();
      return `${d}/${m}/${y}`;
    }

    function formatReadableDate(date) { 
      return date.toLocaleDateString('es-CL',{ weekday:'long', year:'numeric', month:'long', day:'numeric' }); 
    }

    function buildWeekOptions() {
      const weekKeys = new Set(activities.map(a => formatDate(getStartOfWeek(new Date(`${a.date}T12:00:00`)))));
      weekKeys.add(formatDate(getStartOfWeek(new Date())));
      
      availableWeeks = Array.from(weekKeys).map(s => new Date(`${s}T12:00:00`)).sort((a,b) => a-b);
      weekSelect.innerHTML = '';
      
      availableWeeks.forEach(weekStart => {
        const weekEnd = new Date(weekStart); 
        weekEnd.setDate(weekEnd.getDate() + 6);
        const option = document.createElement('option');
        option.value = formatDate(weekStart);
        option.textContent = `${formatDDMMYYYY(weekStart)} - ${formatDDMMYYYY(weekEnd)}`;
        weekSelect.appendChild(option);
      });
    }

    function updateWeekRange() {
      const start = getStartOfWeek(currentDate); 
      const end = new Date(start); 
      end.setDate(start.getDate() + 6);
     // document.getElementById('weekRange').textContent = `${formatDDMMYYYY(start)} - ${formatDDMMYYYY(end)}`;
    }

    function updateWeekButtons() {
      const key = formatDate(getStartOfWeek(currentDate));
      const index = availableWeeks.findIndex(w => formatDate(w) === key);
      prevWeekBtn.disabled = index <= 0;
      nextWeekBtn.disabled = index === -1 || index >= availableWeeks.length - 1;
    }

    function syncWeekSelect() { 
      weekSelect.value = formatDate(getStartOfWeek(currentDate)); 
      updateWeekButtons(); 
    }

    function updateCalendar() {
      const startOfWeek = getStartOfWeek(currentDate);
      const calendar = document.getElementById('calendarContainer');
      const todayStr = formatDate(new Date()); 
      
      calendar.innerHTML = '';
      updateWeekRange();
      syncWeekSelect();
      
      let hasActivities = false;
      for (let i = 0; i < 7; i++) {
        const day = new Date(startOfWeek); 
        day.setDate(startOfWeek.getDate() + i);
        const dayStr = formatDate(day);
        const dayActivities = activities.filter(a => a.date === dayStr);
        
        if (dayActivities.length > 0) {
          hasActivities = true;
          const group = document.createElement('div'); 
          group.className = 'day-group';
          
          if (dayStr === todayStr) {
            group.classList.add('today-highlight');
          }
          
          const header = document.createElement('div'); 
          header.className = 'date-header'; 
          
          const dateText = document.createElement('span');
          dateText.textContent = formatReadableDate(day);
          header.appendChild(dateText);

          if (dayStr === todayStr) {
            const badge = document.createElement('span');
            badge.className = 'today-badge';
            badge.textContent = 'Hoy';
            header.appendChild(badge);
          }

          group.appendChild(header);
          
          const activityContainer = document.createElement('div'); 
          activityContainer.className = 'activities';
          
          dayActivities.forEach(a => {
            const act = document.createElement('div'); 
            
            if (a.type === 'birthday') {
              act.className = 'activity birthday';
              act.innerHTML = `
                <div class="birthday-icon-wrapper">🎂</div>
                <div class="activity-info">
                  <div class="birthday-title">${a.title}</div>
                  
                </div>
              `;
			  // <div class="birthday-description">${a.description || ''}</div>
            } else {
              act.className = 'activity meeting';
              act.innerHTML = `
                <img src="${a.image}" alt="${a.title}">
                <div class="activity-info">
                  <div class="activity-title">${a.title}</div>
                  <div class="activity-description">${a.description || ''}</div>
                </div>
              `;
            }
            activityContainer.appendChild(act);
          });
          
          group.appendChild(activityContainer); 
          calendar.appendChild(group);
        }
      }
      if (!hasActivities) {
        const empty = document.createElement('div'); 
        empty.className = 'empty-week'; 
        empty.textContent = 'No hay actividades registradas para esta semana.'; 
        calendar.appendChild(empty);
      }
    }

    function changeWeek(offset) {
      const key = formatDate(getStartOfWeek(currentDate));
      const idx = availableWeeks.findIndex(w => formatDate(w) === key);
      const nextIdx = idx + offset;
      if (nextIdx < 0 || nextIdx >= availableWeeks.length) return;
      currentDate = new Date(availableWeeks[nextIdx]);
      updateCalendar();
    }

    weekSelect.addEventListener('change', function() { 
      currentDate = new Date(`${this.value}T12:00:00`); 
      updateCalendar(); 
    });

    function init() {
      buildWeekOptions();
      currentDate = new Date(getStartOfWeek(new Date()));
      updateCalendar();
    }
    
    init();
  </script>
</body>
</html>
